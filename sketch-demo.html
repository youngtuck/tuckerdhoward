<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch — Tucker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #080807;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; gap: 32px;
}
.stage {
  position: relative;
  width: 260px; height: 380px;
}
svg {
  width: 100%; height: 100%;
  overflow: visible;
}
.replay {
  font-family: 'Georgia', serif; font-size: 11px;
  letter-spacing: .16em; text-transform: uppercase;
  color: rgba(200,169,110,.4); cursor: pointer;
  border: none; background: none; padding: 10px 20px;
  transition: color .3s;
}
.replay:hover { color: rgba(200,169,110,.85); }
</style>
</head>
<body>
<div class="stage">
  <svg id="sk" viewBox="0 0 260 380" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<button class="replay" id="replayBtn">↺ Replay animation</button>

<script src="images/sketch-paths.js"></script>
<script>
(function() {
  const svg = document.getElementById('sk');
  const GOLD = 'rgba(200,169,110,';

  // Style config per class
  const styles = {
    bold:  { w: 1.9, a: 0.88 },
    mid:   { w: 1.3, a: 0.65 },
    light: { w: 0.8, a: 0.38 },
  };

  // Create all path elements, hidden
  function build() {
    svg.innerHTML = '';
    SKETCH_PATHS.forEach((p, i) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const s = styles[p.cls] || styles.light;
      el.setAttribute('d', p.d);
      el.setAttribute('fill', 'none');
      el.setAttribute('stroke', GOLD + s.a + ')');
      el.setAttribute('stroke-width', s.w);
      el.setAttribute('stroke-linecap', 'round');
      el.setAttribute('stroke-linejoin', 'round');
      el.id = p.id;
      svg.appendChild(el);

      // Init dashoffset
      try {
        const len = el.getTotalLength();
        el.style.strokeDasharray = len;
        el.style.strokeDashoffset = len;
      } catch(e) {
        el.style.strokeDasharray = p.len;
        el.style.strokeDashoffset = p.len;
      }
    });
  }

  function animate() {
    // Sort: bold first (longest), then mid, then light
    // Within each tier, longest first
    const tiers = {bold: [], mid: [], light: []};
    SKETCH_PATHS.forEach(p => tiers[p.cls].push(p));
    Object.values(tiers).forEach(arr => arr.sort((a,b) => b.len - a.len));

    let t = 0;

    // Bold strokes: draw over 3000ms, staggered 80ms each
    tiers.bold.forEach((p, i) => {
      const delay = i * 80;
      const dur = Math.min(2200, Math.max(400, p.len * 1.5));
      scheduleStroke(p.id, delay, dur);
    });
    const boldEnd = tiers.bold.length * 80 + 800;

    // Mid strokes: start at 60% through bold, staggered 60ms
    tiers.mid.forEach((p, i) => {
      const delay = boldEnd * 0.5 + i * 60;
      const dur = Math.min(1600, Math.max(300, p.len * 1.2));
      scheduleStroke(p.id, delay, dur);
    });
    const midEnd = boldEnd * 0.5 + tiers.mid.length * 60 + 600;

    // Light strokes: start at 60% through mid, staggered 40ms
    tiers.light.forEach((p, i) => {
      const delay = midEnd * 0.7 + i * 40;
      const dur = Math.min(1200, Math.max(200, p.len * 0.9));
      scheduleStroke(p.id, delay, dur);
    });
  }

  function scheduleStroke(id, delay, dur) {
    const el = document.getElementById(id);
    if (!el) return;
    setTimeout(() => {
      el.style.transition = `stroke-dashoffset ${dur}ms cubic-bezier(0.3, 0, 0.5, 1)`;
      el.style.strokeDashoffset = '0';
    }, delay);
  }

  function play() {
    build();
    // Force reflow
    svg.getBoundingClientRect();
    setTimeout(animate, 100);
  }

  // Auto-play
  setTimeout(play, 600);
  document.getElementById('replayBtn').addEventListener('click', play);
})();
</script>
</body>
</html>
